<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Lens & Love</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="assets/js/tailwind-config.js"></script>
    <style>
        html {
            scroll-behavior: smooth;
        }

        body {
            -webkit-font-smoothing: antialiased;
        }
    </style>
</head>

<body
    class="bg-lightBg dark:bg-darkBg text-textDark dark:text-textLight font-body min-h-screen flex flex-col transition-colors duration-300">

    <main class="flex-grow pt-10">

        <div class="max-w-[1400px] mx-auto px-4 sm:px-6 lg:px-8 py-12">

            <div class="text-center mb-12">
                <span class="text-primary tracking-widest uppercase text-sm font-semibold">Our Portfolio</span>
                <h1 class="font-heading text-5xl font-bold mt-4 mb-8">Selected Works</h1>

                <div class="flex justify-center space-x-2 md:space-x-4 mb-4" id="gallery-filters">
                    <button
                        class="filter-btn active px-6 py-2 rounded-full border border-primary bg-primary text-white transition-colors"
                        data-filter="all">All</button>
                    <button
                        class="filter-btn px-6 py-2 rounded-full border border-gray-300 dark:border-gray-700 bg-transparent text-textDark dark:text-gray-300 hover:border-primary hover:text-primary transition-colors"
                        data-filter="weddings">Weddings</button>
                    <button
                        class="filter-btn px-6 py-2 rounded-full border border-gray-300 dark:border-gray-700 bg-transparent text-textDark dark:text-gray-300 hover:border-primary hover:text-primary transition-colors"
                        data-filter="portraits">Couples</button>
                </div>
            </div>

            <!-- Grid items are injected by Javascript here -->
            <div class="grid grid-cols-[repeat(auto-fill,minmax(280px,1fr))] gap-6 grid-flow-dense py-8"
                id="gallery-container">
                <!-- Javascript will render images here -->
            </div>
        </div>

    </main>

    <!-- Custom Lightbox Modal -->
    <div id="lightbox"
        class="hidden fixed inset-0 z-[110] bg-black/95 flex items-center justify-center backdrop-blur-md opacity-0 transition-opacity duration-300">
        <button id="lightbox-close" class="absolute top-6 right-6 text-white/70 hover:text-white transition-colors">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
        </button>
        <img id="lightbox-img" src="" alt="Enlarged Photo"
            class="max-h-[85vh] max-w-[90vw] object-contain shadow-2xl rounded-sm">
        <div id="lightbox-caption"
            class="absolute bottom-6 left-0 right-0 text-center text-white/90 font-heading text-2xl tracking-wide">
        </div>
    </div>

    <!-- App JS -->
    <script src="assets/js/app.js"></script>

    <!-- Dynamic Content Generation -->
    <script src="assets/js/gallery.js"></script>
</body>

</html>
