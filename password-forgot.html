<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Lens & Love</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
    
            <script src="https://cdn.tailwindcss.com"></script>
    <script src="assets/js/tailwind-config.js"></script>
    <style> html { scroll-behavior: smooth; } body { -webkit-font-smoothing: antialiased; } </style>
</head>
<body class="bg-lightBg dark:bg-darkBg text-textDark dark:text-textLight font-body min-h-screen flex flex-col transition-colors duration-300">

    <main class="flex-grow flex items-center justify-center py-16 px-4 lg:px-8">
        
        <div class="bg-cardLight dark:bg-cardDark w-full max-w-md rounded-2xl p-10 shadow-xl border border-gray-100 dark:border-gray-800 transition-colors duration-300">
            <div class="text-center mb-8">
                <h1 class="font-heading text-3xl font-bold text-primary mb-2">Password Forgotten</h1>
                <p class="text-sm opacity-80 font-light text-gray-600 dark:text-gray-300">Enter your email address and we'll send you a link to reset your password.</p>
            </div>

            <form id="reset-password-form" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium mb-2 opacity-80">E-Mail Address</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207" /></svg>
                        </div>
                        <input type="email" id="reset-email" required class="w-full pl-10 pr-4 py-3 rounded-md border border-gray-300 dark:border-gray-700 bg-lightBg dark:bg-darkBg focus:ring-2 focus:ring-primary focus:outline-none transition-colors" placeholder="hello@example.com">
                    </div>
                </div>

                <button type="submit" class="btn-primary w-full shadow-md hover:shadow-lg py-3">
                    Reset Password
                </button>
            </form>

            <div id="reset-success" class="hidden mt-6 p-4 bg-green-50 dark:bg-green-900/20 border border-green-200 dark:border-green-800 rounded-lg">
                <div class="flex">
                    <div class="flex-shrink-0">
                        <svg class="h-5 w-5 text-green-400" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" /></svg>
                    </div>
                    <div class="ml-3">
                        <p class="text-sm text-green-700 dark:text-green-300 font-medium">Reset link sent successfully to <span id="sent-email"></span>!</p>
                    </div>
                </div>
            </div>

            <div class="mt-8 text-center">
                <a href="index.html" class="text-primary hover:text-primaryDark text-sm font-medium hover:underline flex items-center justify-center transition-colors">
                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    Back to Homepage
                </a>
            </div>
        </div>

    </main>

    <!-- App JS -->
    <script src="assets/js/app.js"></script>

    <!-- UI Logic for form -->
    <script>
        document.getElementById('reset-password-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('reset-email').value;
            document.getElementById('sent-email').textContent = email;
            document.getElementById('reset-success').classList.remove('hidden');
            this.reset();
        });
    </script>
</body>
</html>
